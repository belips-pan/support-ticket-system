<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Είσοδος / Εγγραφή</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="container mt-5">
    <div class="row">
        <div class="col-md-6 border-end">
            <h3>Είσοδος Χρήστη</h3>
            <form th:action="@{/login}" method="post">
                <div class="mb-3">
                    <label>Username:</label>
                    <input type="text" name="username" class="form-control" required>
                </div>
                <div class="mb-3">
                    <label>Password:</label>
                    <input type="password" name="password" class="form-control" required>
                </div>
                <button type="submit" class="btn btn-success">Σύνδεση</button>
            </form>
        </div>

        <div class="col-md-6">
            <h3>Νέος Χρήστης; Εγγραφείτε</h3>
            <div th:if="${error}" class="alert alert-danger" role="alert">
                <span th:text="${error}"></span>
            </div>
            <form th:action="@{/register}" method="post">
                <div class="mb-3">
                    <label>Username:</label>
                    <input type="text" name="username" class="form-control" required>
                </div>
                <div class="mb-3">
                    <label>Password:</label>
                    <input type="password" name="password" class="form-control" required>
                </div>
                <div class="mb-3">
                    <label>Ονοματεπώνυμο:</label>
                    <input type="text" name="fullName" class="form-control" required>
                </div>
                <div class="mb-3">
                    <label class="form-label">Email</label>
                    <input type="email" name="email" class="form-control" placeholder="π.χ. user@example.com" required>
                </div>
                <div class="mb-3">
                    <label>Κωδικός Προϊόντος:</label>
                    <input type="text" name="productOwnership" class="form-control" placeholder="π.χ. PROD-001" required>
                </div>
                <button type="submit" class="btn btn-primary">Εγγραφή</button>
            </form>
        </div>
    </div>
</body>
</html>
