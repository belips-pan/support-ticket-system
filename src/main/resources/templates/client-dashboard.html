<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head>
    <meta charset="UTF-8">
    <title>My Support | Dashboard</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">
</head>

<body class="p-4 bg-light">
    <div class="container bg-white p-4 shadow-sm rounded">
        <div class="d-flex justify-content-between align-items-center">
            <h3>Καλώς ήρθατε, <span th:text="${user.fullName}"></span></h3>
            <a th:href="@{/logout}" class="btn btn-outline-danger btn-sm">
                <i class="bi bi-box-arrow-right"></i> Αποσύνδεση
            </a>
        </div>
        
        <p class="mt-2">
            Υπόλοιπο: <b class="text-success" th:text="${user.balance} + '€'"></b> | 
            Προϊόν: <span class="badge bg-secondary" th:text="${user.productOwnership}"></span>
        </p>
        <hr>

        <div class="d-flex justify-content-between align-items-center mb-3">
            <h4>Τα Αιτήματά μου</h4>
            <button class="btn btn-primary" data-bs-toggle="modal" data-bs-target="#newTicketModal">
                <i class="bi bi-plus-circle"></i> Νέο Αίτημα
            </button>
        </div>

        <table class="table table-hover">
            <thead class="table-light">
                <tr>
                    <th>Θέμα</th>
                    <th>Κατάσταση</th>
                    <th>Απάντηση Υποστήριξης</th>
                </tr>
            </thead>
            <tbody>
                <tr th:each="t : ${tickets}">
                    <td th:text="${t.title}"></td>
                    <td>
                        <span th:text="${t.status}" 
                              th:class="${t.status == 'OPEN' ? 'badge bg-warning text-dark' : 'badge bg-success'}">
                        </span>
                    </td>
                    <td class="font-monospace" th:text="${t.adminResponse != null ? t.adminResponse : 'Σε αναμονή...'}"></td>
                </tr>
                <tr th:if="${#lists.isEmpty(tickets)}">
                    <td colspan="3" class="text-center text-muted">Δεν έχετε υποβάλει ακόμα κάποιο αίτημα.</td>
                </tr>
            </tbody>
        </table>
    </div>

    <div class="modal fade" id="newTicketModal" tabindex="-1" aria-hidden="true">
        <div class="modal-dialog">
            <div class="modal-content">
                <form th:action="@{/client/tickets/create}" method="post">
                    <!--
                    <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}" />
                    -->
                    <div class="modal-header">
                        <h5 class="modal-title">Υποβολή Νέου Αιτήματος</h5>
                        <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
                    </div>
                    <div class="modal-body">
                        <div class="mb-3">
                            <label class="form-label">Τίτλος Προβλήματος</label>
                            <input type="text" name="title" class="form-control" placeholder="π.χ. Πρόβλημα με τη σύνδεση" required>
                        </div>
                        <div class="mb-3">
                            <label class="form-label">Περιγραφή</label>
                            <textarea name="description" class="form-control" rows="4" placeholder="Περιγράψτε το πρόβλημά σας αναλυτικά..." required></textarea>
                        </div>
                    </div>
                    <div class="modal-footer">
                        <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Άκυρο</button>
                        <button type="submit" class="btn btn-primary">Αποστολή</button>
                    </div>
                </form>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
