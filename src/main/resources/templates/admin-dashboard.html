<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head>
    <meta charset="UTF-8">
    <title>Admin Dashboard | Support System</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">
    <style>
        body {
            background-color: #f8f9fa;
        }

        .sidebar {
            height: 100vh;
            background: #212529;
            color: white;
            padding-top: 20px;
        }

        .nav-link {
            color: rgba(255, 255, 255, 0.8);
        }

        .nav-link:hover, .nav-link.active {
            color: white;
            background: rgba(255, 255, 255, 0.1);
            border-radius: 5px;
        }

        .card {
            border-radius: 10px;
            border: none;
            box-shadow: 0 4px 6px rgba(0, 0, 0, 0.1);
        }
    </style>
</head>

<body>

    <div class="container-fluid">
        <div class="row">
            <nav class="col-md-2 d-none d-md-block sidebar">
                <div class="position-sticky text-center">
                    <h4>Support Admin</h4>
                    <hr>
                    <ul class="nav flex-column text-start px-3">
                        <li class="nav-item mb-2">
                            <a class="nav-link active" href="/admin/dashboard">
                                <i class="bi bi-ticket-perforated me-2"></i>Διαχείριση Tickets
                            </a>
                        </li>
                        <li class="nav-item mb-2">
                            <a class="nav-link" href="/admin/users">
                                <i class="bi bi-people me-2"></i>Διαχείριση Χρηστών
                            </a>
                        </li>
                        <li class="nav-item mb-2">
                            <a class="nav-link" href="/admin/reports">
                                <i class="bi bi-graph-up me-2"></i>Αναφορές
                            </a>
                        </li>
                    </ul>
                    <hr>
                    <a th:href="@{/logout}" class="btn btn-outline-danger btn-sm w-75">Αποσύνδεση</a>
                </div>
            </nav>

            <main class="col-md-10 ms-sm-auto px-md-4">
                <div class="d-flex justify-content-between align-items-center pt-3 pb-2 mb-3 border-bottom">
                    <h1 class="h2">Διαχείριση Αιτημάτων</h1>
                    <button class="btn btn-primary" data-bs-toggle="modal" data-bs-target="#newTicketModal">
                        <i class="bi bi-plus-circle me-1"></i> Νέο Ticket
                    </button>
                </div>

                <div class="card">
                    <div class="card-body px-0">
                        <div class="table-responsive">
                            <table class="table table-hover align-middle mb-0">
                                <thead class="table-light">
                                    <tr>
                                        <th class="ps-4">ID</th>
                                        <th>Χρήστης</th>
                                        <th>Τίτλος</th>
                                        <th>Κατάσταση</th>
                                        <th class="text-center">Ενέργειες</th>
                                    </tr>
                                </thead>
                                <tbody>
                                    <tr th:each="t : ${tickets}">
                                        <td class="ps-4" th:text="${t.id}"></td>
                                        <td th:text="${t.sender != null ? t.sender.username : 'Unknown'}"></td>
                                        <td th:text="${t.title}"></td>
                                        <td>
                                            <span th:text="${t.status}" 
                                                  th:class="${t.status == 'OPEN' ? 'badge bg-danger' : (t.status == 'CLOSED' ? 'badge bg-success' : 'badge bg-info')}">
                                            </span>
                                        </td>
                                        <td class="text-center">
                                            <div class="d-flex justify-content-center gap-2">
                                                <a th:href="@{/admin/tickets/{id}(id=${t.id})}" class="btn btn-outline-info btn-sm">
                                                    <i class="bi bi-eye"></i> Προβολή
                                                </a>

                                                <a th:href="@{/admin/tickets/delete/{id}(id=${t.id})}" 
                                                   class="btn btn-outline-danger btn-sm" 
                                                   onclick="return confirm('Σίγουρα διαγραφή;');">
                                                    <i class="bi bi-trash"></i>
                                                </a>
                                            </div>
                                        </td>
                                    </tr>
                                </tbody>
                            </table>
                        </div>
                    </div>
                </div>
            </main>
        </div>
    </div>

    <div class="modal fade" id="newTicketModal" tabindex="-1" aria-hidden="true">
        <div class="modal-dialog">
            <div class="modal-content">
                <form th:action="@{/admin/tickets/create}" method="post">
                    <div class="modal-header bg-primary text-white">
                        <h5 class="modal-title">Δημιουργία Νέου Αιτήματος</h5>
                        <button type="button" class="btn-close btn-close-white" data-bs-dismiss="modal"></button>
                    </div>
                    <div class="modal-body">
                        <div class="mb-3">
                            <label class="form-label">Επιλογή Χρήστη</label>
                            <select name="userId" class="form-select" required>
                                <option value="">Επιλέξτε Πελάτη...</option>
                                <option th:each="user : ${users}" th:value="${user.id}" th:text="${user.username}"></option>
                            </select>
                        </div>
                        <div class="mb-3">
                            <label class="form-label">Τίτλος</label>
                            <input type="text" name="title" class="form-control" required>
                        </div>
                        <div class="mb-3">
                            <label class="form-label">Περιγραφή Προβλήματος</label>
                            <textarea name="description" class="form-control" rows="4" required></textarea>
                        </div>
                    </div>
                    <div class="modal-footer">
                        <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Άκυρο</button>
                        <button type="submit" class="btn btn-primary">Δημιουργία</button>
                    </div>
                </form>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
