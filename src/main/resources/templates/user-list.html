<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>User Management Dashboard</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
</head>
<body class="bg-light">
    <div class="container mt-5">
        <div class="card shadow">
            <div class="card-header bg-dark text-white">
                <h3>Διαχείριση Πελατών & Υπολοίπων</h3>
            </div>
            <div class="card-body">
                <table class="table table-hover">
                    <thead>
                        <tr>
                            <th>Ονοματεπώνυμο</th>
                            <th>Email / Τηλέφωνο</th>
                            <th>Προϊόν (Ownership)</th>
                            <th>Υπόλοιπο (€)</th>
                            <th>Ενέργειες</th>
                        </tr>
                    </thead>
                    <tbody>
                        <tr th:each="user : ${users}">
                            <td th:text="${user.fullName}"></td>
                            <td>
                                <span th:text="${user.email}"></span><br>
                                <small class="text-muted" th:text="${user.phone}"></small>
                            </td>
                            <td><span class="badge bg-info text-dark" th:text="${user.productOwnership}"></span></td>
                            <td th:text="${user.balance} + ' €'" class="fw-bold text-success"></td>
                            <td>
                                <!-- Φόρμα για γρήγορη χρέωση/πίστωση -->
                                <form th:action="@{/admin/users/{id}/add-balance(id=${user.id})}" method="post" class="d-inline">
                                    <input type="number" name="amount" step="0.01" style="width: 70px;" placeholder="0.00">
                                    <button type="submit" class="btn btn-sm btn-primary">Προσθήκη</button>
                                </form>
                            </td>
                        </tr>
                    </tbody>
                </table>
            </div>
        </div>
        <div class="mt-3">
            <a href="/admin/dashboard" class="btn btn-secondary">Επιστροφή στα Tickets</a>
        </div>
    </div>
</body>
</html>
