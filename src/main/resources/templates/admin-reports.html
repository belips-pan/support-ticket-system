<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Admin Reports</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
</head>
<body class="p-4 bg-light">
    <div class="container bg-white p-4 shadow rounded">
        <div class="d-flex justify-content-between">
            <h2>Οικονομικά & Στατιστικά Στοιχεία</h2>
            <a href="/admin/dashboard" class="btn btn-secondary">Πίσω στο Dashboard</a>
        </div>
        <hr>
        
        <div class="row text-center mb-4">
            <div class="col-md-4">
                <div class="card bg-success text-white p-3">
                    <h4>Συνολικά Έσοδα</h4>
                    <h2 th:text="${totalRevenue} + ' €'"></h2>
                </div>
            </div>
            <div class="col-md-4">
                <div class="card bg-warning text-dark p-3">
                    <h4>Ανοιχτά Tickets</h4>
                    <h2 th:text="${openTickets}"></h2>
                </div>
            </div>
            <div class="col-md-4">
                <div class="card bg-info text-white p-3">
                    <h4>Σύνολο Tickets</h4>
                    <h2 th:text="${totalTickets}"></h2>
                </div>
            </div>
        </div>

        <h4>Κατάσταση Πελατών</h4>
        <table class="table table-striped">
            <thead>
                <tr>
                    <th>Όνομα</th>
                    <th>Προϊόν</th>
                    <th>Υπόλοιπο (€)</th>
                    <th>Email</th>
                </tr>
            </thead>
            <tbody>
                <tr th:each="u : ${users}" th:if="${u.role == 'ROLE_USER'}">
                    <td th:text="${u.fullName}"></td>
                    <td th:text="${u.productOwnership}"></td>
                    <td th:text="${u.balance}" th:class="${u.balance < 10 ? 'text-danger fw-bold' : ''}"></td>
                    <td th:text="${u.email}"></td>
                </tr>
            </tbody>
        </table>
    </div>
</body>
</html>
